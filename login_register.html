<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndreaAI - Iniciar sesión / Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="app.css">
    <style>
        /* Estilos igual que antes */
        body {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 40px var(--shadow);
            transition: transform 0.2s;
            max-width: 450px;
            width: 100%;
        }
        .auth-card:hover {
            transform: translateY(-5px);
        }
        .auth-header {
            text-align: center;
            padding: 1.5rem 1.5rem 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .auth-header img {
            width: 48px;
            margin-bottom: 10px;
        }
        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-tabs {
            border-bottom: 1px solid var(--border);
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .nav-tabs .nav-link {
            color: var(--text-secondary);
            background: transparent;
            border: none;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            transition: all 0.2s;
        }
        .nav-tabs .nav-link.active {
            color: var(--accent);
            background: var(--accent-soft);
            border-bottom: 2px solid var(--accent);
        }
        .form-group {
            position: relative;
        }
        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem var(--accent-soft);
            color: var(--text-primary);
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            z-index: 10;
        }
        .password-toggle:hover {
            color: var(--accent);
        }
        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 30px;
            padding: 0.75rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .alert {
            border-radius: 12px;
            font-size: 0.9rem;
        }
        .footer-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
        }
        .footer-link a:hover {
            text-decoration: underline;
        }
        label {
            color: var(--text-secondary);
        }
        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <img src="icon_AI.png" alt="AndreaAI">
            <h2>Andrea<span class="gradient-text">AI</span></h2>
        </div>
        <div class="p-4">
            <ul class="nav nav-tabs" id="authTab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Iniciar sesión</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Registrarse</button>
                </li>
            </ul>
            <div class="tab-content">
                <!-- Login -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="login-email" autocomplete="email" required>
                        </div>
                        <div class="mb-3 form-group">
                            <label for="login-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="login-password" autocomplete="current-password" required>
                            <button type="button" class="password-toggle" data-target="login-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="login-error" class="alert alert-danger d-none"></div>
                        <button type="submit" class="btn btn-primary w-100" id="login-btn">
                            Iniciar sesión
                        </button>
                    </form>
                    <div class="footer-link mt-3">
                        ¿No tienes cuenta? <a href="#" id="switch-to-register">Regístrate</a>
                    </div>
                </div>
                <!-- Register -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="register-form">
                        <div class="mb-3">
                            <label for="register-email" class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" id="register-email" autocomplete="email" required>
                        </div>
                        <div class="mb-3 form-group">
                            <label for="register-password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="register-password" autocomplete="new-password" required>
                            <button type="button" class="password-toggle" data-target="register-password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div id="register-error" class="alert alert-danger d-none"></div>
                        <div id="register-success" class="alert alert-success d-none"></div>
                        <button type="submit" class="btn btn-primary w-100" id="register-btn">
                            Registrarse
                        </button>
                    </form>
                    <div class="footer-link mt-3">
                        ¿Ya tienes cuenta? <a href="#" id="switch-to-login">Inicia sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="personality.js"></script>
    <script src="andrea-app.js"></script>
    <script src="tools.js"></script>

    <script>
        // Esperar a que la app cargue y window.supabaseClient esté disponible
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar que window.supabaseClient existe (definido en andrea-app.js)
            if (!window.supabaseClient) {
                console.error('SupabaseClient no está disponible. Asegúrate de que andrea-app.js se cargue correctamente.');
                return;
            }

            const supabaseClient = window.supabaseClient;

            // Elementos del DOM
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginError = document.getElementById('login-error');
            const registerError = document.getElementById('register-error');
            const registerSuccess = document.getElementById('register-success');
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');

            // Función para mostrar/ocultar contraseña
            function setupPasswordToggle() {
                const toggles = document.querySelectorAll('.password-toggle');
                toggles.forEach(toggle => {
                    toggle.addEventListener('click', () => {
                        const targetId = toggle.getAttribute('data-target');
                        const input = document.getElementById(targetId);
                        const icon = toggle.querySelector('i');
                        if (input.type === 'password') {
                            input.type = 'text';
                            icon.classList.remove('fa-eye');
                            icon.classList.add('fa-eye-slash');
                        } else {
                            input.type = 'password';
                            icon.classList.remove('fa-eye-slash');
                            icon.classList.add('fa-eye');
                        }
                    });
                });
            }
            setupPasswordToggle();

            // Cambiar pestañas
            document.getElementById('switch-to-register').addEventListener('click', (e) => {
                e.preventDefault();
                const registerTab = new bootstrap.Tab(document.getElementById('register-tab'));
                registerTab.show();
            });
            document.getElementById('switch-to-login').addEventListener('click', (e) => {
                e.preventDefault();
                const loginTab = new bootstrap.Tab(document.getElementById('login-tab'));
                loginTab.show();
            });

            // Verificar si ya hay sesión activa y redirigir al chat
            supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    window.location.href = 'index.html';
                }
            });

            // Login
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                loginError.classList.add('d-none');

                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Iniciando...';

                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Iniciar sesión';

                if (error) {
                    loginError.textContent = error.message;
                    loginError.classList.remove('d-none');
                    return;
                }
                // Redirigir al chat
                window.location.href = 'index.html';
            });

            // Registro
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                registerError.classList.add('d-none');
                registerSuccess.classList.add('d-none');

                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Registrando...';

                const { data, error } = await supabaseClient.auth.signUp({ email, password });

                registerBtn.disabled = false;
                registerBtn.innerHTML = 'Registrarse';

                if (error) {
                    registerError.textContent = error.message;
                    registerError.classList.remove('d-none');
                    return;
                }
                registerSuccess.textContent = '¡Registro exitoso! Revisa tu correo para confirmar la cuenta.';
                registerSuccess.classList.remove('d-none');
                // Limpiar campos
                document.getElementById('register-email').value = '';
                document.getElementById('register-password').value = '';
            });
        });
    </script>
</body>
</html>
