<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AndreaAI - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .admin-card { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-control { background: #0d1117; border: 1px solid #30363d; color: #fff; margin-bottom: 1rem; }
        .form-control:focus { background: #0d1117; color: #fff; border-color: #58a6ff; box-shadow: none; }
        .btn-primary { background: #238636; border: none; width: 100%; font-weight: 600; }
        .btn-primary:hover { background: #2ea043; }
        .hidden { display: none; }
        .status-msg { font-size: 12px; margin-top: 10px; text-align: center; }
        .warning { color: #ffaa00; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="login-section" class="admin-card">
        <h3 class="text-center mb-4"><i class="fas fa-lock"></i> Admin Login</h3>
        <input type="password" id="admin-pass" class="form-control" placeholder="Enter Password">
        <button onclick="checkPassword()" class="btn btn-primary">Unlock Panel</button>
        <p id="login-error" class="text-danger status-msg hidden">Incorrect Password</p>
    </div>

    <div id="config-section" class="admin-card hidden">
        <h3 class="text-center mb-4"><i class="fas fa-cog"></i> System Config</h3>
        
        <div class="warning"><i class="fas fa-exclamation-triangle"></i> Cambia la contraseña por defecto en el código (admin.html, línea con MASTER_PASSWORD).</div>
        
        <label class="small text-muted">OpenRouter API Key</label>
        <input type="password" id="api-key-input" class="form-control" placeholder="sk-or-v1-...">

        <label class="small text-muted">Active Model ID</label>
        <input type="text" id="model-id-input" class="form-control" placeholder="e.g. google/gemini-2.0-flash-exp:free">

        <button onclick="saveConfig()" class="btn btn-primary mb-2">Save Changes</button>
        <button onclick="location.href='index.html'" class="btn btn-outline-secondary btn-sm w-100">Back to Chat</button>
        <p id="save-status" class="text-success status-msg hidden">Settings saved successfully!</p>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // CAMBIA ESTA CONTRASEÑA POR UNA SEGURA
        const MASTER_PASSWORD = "admin123"; // Contraseña por defecto, cámbiala

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === MASTER_PASSWORD) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('config-section').classList.remove('hidden');
                loadCurrentValues();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function loadCurrentValues() {
            // Cargar lo que ya esté guardado en el navegador
            document.getElementById('api-key-input').value = localStorage.getItem('andrea_api_key') || '';
            document.getElementById('model-id-input').value = localStorage.getItem('andrea_selected_model') || 'openrouter/free';
        }

        function saveConfig() {
            const key = document.getElementById('api-key-input').value.trim();
            const model = document.getElementById('model-id-input').value.trim();

            if(key) localStorage.setItem('andrea_api_key', key);
            if(model) localStorage.setItem('andrea_selected_model', model);

            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
